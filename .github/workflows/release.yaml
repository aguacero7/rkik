name: Release & Publish

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    name: Build and Deploy All Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm build-essential zip
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked
          cargo install cross --locked

      - name: Build Linux x86_64
        run: cargo build --release

      - name: Generate .deb package
        run: cargo deb

      - name: Generate .rpm package
        run: cargo generate-rpm

      - name: Prepare Linux artifacts
        run: |
          mkdir -p dist
          cp target/release/rkik dist/rkik-linux-x86_64
          cp target/debian/*.deb dist/
          cp target/generate-rpm/*.rpm dist/

      - name: Build Windows x86_64
        run: |
          CARGO_TARGET_DIR=target-cross \
            cross build --release --target x86_64-pc-windows-gnu

      - name: Prepare Archives
        run: |
          cp target-cross/x86_64-pc-windows-gnu/release/rkik.exe dist/rkik-windows-x86_64.exe

          tar -czvf rkik-linux-x86_64.tar.gz -C dist rkik-linux-x86_64
          zip -j rkik-windows-x86_64.zip dist/rkik-windows-x86_64.exe

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rkik-linux-x86_64.tar.gz
            rkik-windows-x86_64.zip
            dist/rkik-linux-x86_64
            dist/rkik-windows-x86_64.exe
            dist/*.deb
            dist/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to crates.io
        if: github.event.release.prerelease == false
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
