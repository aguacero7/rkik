name: Release & Publish

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    name: Build and Deploy All Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm build-essential zip mingw-w64 musl-tools

          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked
          cargo install cross --locked

      - name: Build Linux portable binary
        run: |
          cargo build --release --target x86_64-unknown-linux-musl

      - name: Build native Linux binary for packages
        run: |
          cargo build --release

      - name: Build DEB package
        run: |
          cargo deb --no-build

      - name: Build RPM package
        run: |
          cargo generate-rpm

      - name: Build Windows binary
        run: |
          CARGO_TARGET_DIR=target-windows \
          cross build \
            --release \
            --target x86_64-pc-windows-gnu
            
      - name: Prepare release artifacts
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/rkik dist/rkik-linux-x86_64

          cp target-windows/x86_64-pc-windows-gnu/release/rkik.exe \
            dist/rkik-windows-x86_64.exe

          cp target/debian/*.deb dist/
          cp target/generate-rpm/*.rpm dist/

      - name: Create archives
        run: |
          tar -czf rkik-linux-x86_64.tar.gz \
            -C dist rkik-linux-x86_64

          zip -j rkik-windows-x86_64.zip \
            dist/rkik-windows-x86_64.exe

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rkik-linux-x86_64.tar.gz
            rkik-windows-x86_64.zip
            dist/rkik-linux-x86_64
            dist/rkik-windows-x86_64.exe
            dist/*.deb
            dist/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to crates.io
        if: github.event.release.prerelease == false
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
